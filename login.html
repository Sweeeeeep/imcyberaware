<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Login & Registration</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" id="container">
        <!-- Login Form -->
        <div class="form-box login">
            <form action="">
                <h1>Login</h1>
                <div class="input-box">
                    <input type="text" class="input" required>
                    <label class="label">
                        <span class="char" style="--index: 0">U</span>
                        <span class="char" style="--index: 1">s</span>
                        <span class="char" style="--index: 2">e</span>
                        <span class="char" style="--index: 3">r</span>
                        <span class="char" style="--index: 4">n</span>
                        <span class="char" style="--index: 5">a</span>
                        <span class="char" style="--index: 6">m</span>
                        <span class="char" style="--index: 7">e</span>
                    </label>
                    <i class='bx bxs-user'></i>
                </div>
                <div class="input-box">
                    <input type="password" class="input" required>
                    <label class="label">
                        <span class="char" style="--index: 0">P</span>
                        <span class="char" style="--index: 1">a</span>
                        <span class="char" style="--index: 2">s</span>
                        <span class="char" style="--index: 3">s</span>
                        <span class="char" style="--index: 4">w</span>
                        <span class="char" style="--index: 5">o</span>
                        <span class="char" style="--index: 6">r</span>
                        <span class="char" style="--index: 7">d</span>
                    </label>
                    <i class='bx bxs-lock-alt'></i>
                </div>
                <div class="forgot-link">
                    <a href="#">Forgot Password?</a>
                </div>
                <button type="submit" class="btn">Login</button>
                <p>or login with social platforms</p>
                <div class="social-icons">
                    <a href="#"><i class='bx bxl-google'></i></a>
                    <a href="#"><i class='bx bxl-facebook'></i></a>
                    <a href="#"><i class='bx bxl-github'></i></a>
                    <a href="#"><i class='bx bxl-linkedin'></i></a>
                </div>
            </form>
        </div>

        <!-- Registration Form -->
        <div class="form-box register">
            <form action="">
                <h1>Registration</h1>
                <div class="input-box">
                    <input type="text" class="input" required>
                    <label class="label">
                        <span class="char" style="--index: 0">U</span>
                        <span class="char" style="--index: 1">s</span>
                        <span class="char" style="--index: 2">e</span>
                        <span class="char" style="--index: 3">r</span>
                        <span class="char" style="--index: 4">n</span>
                        <span class="char" style="--index: 5">a</span>
                        <span class="char" style="--index: 6">m</span>
                        <span class="char" style="--index: 7">e</span>
                    </label>
                    <i class='bx bxs-user'></i>
                </div>
                <div class="input-box">
                    <input type="email" class="input" required>
                    <label class="label">
                        <span class="char" style="--index: 0">E</span>
                        <span class="char" style="--index: 1">m</span>
                        <span class="char" style="--index: 2">a</span>
                        <span class="char" style="--index: 3">i</span>
                        <span class="char" style="--index: 4">l</span>
                    </label>
                    <i class='bx bxs-envelope'></i>
                </div>
                <div class="input-box">
                    <input type="password" class="input" required>
                    <label class="label">
                        <span class="char" style="--index: 0">P</span>
                        <span class="char" style="--index: 1">a</span>
                        <span class="char" style="--index: 2">s</span>
                        <span class="char" style="--index: 3">s</span>
                        <span class="char" style="--index: 4">w</span>
                        <span class="char" style="--index: 5">o</span>
                        <span class="char" style="--index: 6">r</span>
                        <span class="char" style="--index: 7">d</span>
                    </label>
                    <i class='bx bxs-lock-alt'></i>
                </div>
                <button type="submit" class="btn">Register</button>
                <p>or register with social platforms</p>
                <div class="social-icons">
                    <a href="#"><i class='bx bxl-google'></i></a>
                    <a href="#"><i class='bx bxl-facebook'></i></a>
                    <a href="#"><i class='bx bxl-github'></i></a>
                    <a href="#"><i class='bx bxl-linkedin'></i></a>
                </div>
            </form>
        </div>

        <!-- Toggle Panel -->
        <div class="toggle-box">
            <div class="toggle-panel toggle-left">
                <h1>Hello, Welcome!</h1>
                <p>Don't have an account?</p>
                <button class="btn register-btn">Register</button>
            </div>

            <div class="toggle-panel toggle-right">
                <h1>Welcome Back!</h1>
                <p>Already have an account?</p>
                <button class="btn login-btn">Login</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
